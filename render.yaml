# MedTrack Cloud Config (Triggering Sync)
services:
  - type: web
    name: medtrack
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./equipment.db # Default to SQLite for demo; can be changed to Postgres later
      - key: PYTHON_VERSION
        value: 3.10.0
